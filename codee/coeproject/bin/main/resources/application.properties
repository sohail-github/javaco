spring.application.name=simple-microservice
spring.application.version=1.0.0

# Server Configuration
server.port=8081
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/microservice_db123?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowZeroDatetime=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=wowsql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.microservice=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10

# Spring Boot Configuration
spring.main.banner-mode=console
spring.devtools.restart.enabled=true

# Connection Pool Configuration  
spring.datasource.connection-timeout=30s
spring.datasource.idle-timeout=600s
spring.datasource.max-lifetime=1800s
